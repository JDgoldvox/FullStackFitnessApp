<!-- create auth app-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
    <h2>Login to Your Account</h2>

    <!-- Display errors if the user submits incorrect credentials -->
    {% if form.errors %}
        <p style="color: red;">Your username and password didn't match. Please try again.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %} <!-- Mandatory security token for Django forms -->
        
        <div>
            {{ form.username.label_tag }}
            {{ form.username }}
        </div>
        
        <div>
            {{ form.password.label_tag }}
            {{ form.password }}
        </div>

        <button type="submit">Log In</button>
    </form>
</body>
</html>
